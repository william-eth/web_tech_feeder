plugins:
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "CHANGELOG.md"
    - "docs/**/*.md"
    - "lib/prompts/**/*.erb"
    - "lib/templates/**/*.erb"
    - "vendor/**/*"
    - "tmp/**/*"

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 50

Metrics/ClassLength:
  Enabled: false

Metrics/ModuleLength:
  Max: 200

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Layout/LineLength:
  Max: 150
  Exclude:
    - "lib/notifier/smtp_notifier.rb"
