section_file_filters:
  frontend:
    - '(^|/)(frontend|web|ui|client)(/|$)'
    - '\.(tsx?|jsx?|css|scss|sass|less|vue|svelte)$'
    - '(^|/)(src/)?(components?|pages?|views?|app|hooks|store|router)(/|$)'
    - '(^|/)(next|nuxt|vite|webpack|babel|eslint|prettier|tailwind)'
  backend:
    - '(^|/)(backend|server|api|app|lib|models?|controllers?|services?|workers?|jobs?)(/|$)'
    - '(^|/)db(/|$)'
    - '(^|/)(migrate|schema|seeds)(/|$)'
    - '\.(rb|py|go|java|kt)$'
    - '(^|/)(gemfile|rakefile|puma|sidekiq)'
  devops:
    - '(^|/)\.github/workflows(/|$)'
    - '(^|/)(infra|infrastructure|ops|deploy|deployment|k8s|kubernetes|helm|ansible)(/|$)'
    - '(^|/)(docker|compose|container)(/|$)'
    - '(^|/)(ci|cd|pipeline)(/|$)'
    - '(^|/)(chart|manifests?)(/|$)'
    - '(^|/)Dockerfile'

frontend:
  # Primary sources: curated articles and blog posts for React ecosystem developers
  api_feeds:
    - name: Dev.to React Tag
      url: "https://dev.to/api/articles?tag=react&top=7"
    - name: Dev.to WebDev Tag
      url: "https://dev.to/api/articles?tag=webdev&top=7"

  rss_feeds:
    # Primary curated sources (high-quality blog/tutorial content)
    - url: "https://tkdodo.eu/blog/rss.xml"
      name: TkDodo's Blog
      primary: true
    - url: "https://www.joshwcomeau.com/rss.xml"
      name: Josh W. Comeau
      primary: true
    - url: "https://react.dev/rss.xml"
      name: React Official
      primary: true
    - url: "https://frontendfoc.us/rss/"
      name: Frontend Focus
      primary: true
    # Security feed
    - url: https://nodejs.org/en/feed/vulnerability.xml
      name: Node.js Security Advisories

  # Evergreen keywords: articles matching any keyword are treated as high-value
  evergreen_keywords:
    architecture_and_data:
      - "state management"
      - "data fetching"
      - "rendering"
      - "hydration"
    performance_and_core:
      - "performance"
      - "reactivity"
      - "memoization"
      - "bundle size"
    modern_ui_and_web:
      - "css architecture"
      - "web api"
      - "accessibility"
      - "animation"
    dx_and_ai:
      - "developer experience"
      - "build tool"
      - "ai driven"
      - "llm integration"

  # Secondary sources: releases and issues for version tracking
  github_releases:
    - owner: nodejs
      repo: node
      name: Node.js
    - owner: microsoft
      repo: TypeScript
      name: TypeScript
      release_notes_domains:
        - devblogs.microsoft.com
    - owner: facebook
      repo: react
      name: React
      release_notes_domains:
        - react.dev
    - owner: vercel
      repo: next.js
      name: Next.js

  github_issues:
    - owner: nodejs
      repo: node
      name: Node.js
    - owner: microsoft
      repo: TypeScript
      name: TypeScript
    - owner: facebook
      repo: react
      name: React
    - owner: vercel
      repo: next.js
      name: Next.js

  github_advisories:
    ecosystem: npm
    packages: [node, react, next, typescript]

  github_repo_advisories:
    - owner: facebook
      repo: react
      name: React
    - owner: vercel
      repo: next.js
      name: Next.js

backend:
  github_releases:
    - owner: golang
      repo: go
      name: Go
    - owner: ruby
      repo: ruby
      name: Ruby
    - owner: rails
      repo: rails
      name: Ruby on Rails
    # Key gem releases are also tracked via GitHub
    - owner: ged
      repo: ruby-pg
      name: pg (PostgreSQL)
    - owner: puma
      repo: puma
      name: Puma
    - owner: redis
      repo: redis-rb
      name: redis-rb
    - owner: lostisland
      repo: faraday
      name: Faraday
    - owner: sidekiq
      repo: sidekiq
      name: Sidekiq
      release_strategy: auto
      release_notes_files:
        - Changes.md
        - Pro-Changes.md
        - Ent-Changes.md
    - owner: jwt
      repo: ruby-jwt
      name: ruby-jwt
    - owner: doorkeeper-gem
      repo: doorkeeper
      name: Doorkeeper
    - owner: heartcombo
      repo: devise
      name: Devise

  github_issues:
    - owner: golang
      repo: go
      name: Go
    - owner: ruby
      repo: ruby
      name: Ruby
    - owner: rails
      repo: rails
      name: Ruby on Rails
    - owner: ged
      repo: ruby-pg
      name: pg (PostgreSQL)
    - owner: puma
      repo: puma
      name: Puma
    - owner: redis
      repo: redis-rb
      name: redis-rb
    - owner: lostisland
      repo: faraday
      name: Faraday
    - owner: sidekiq
      repo: sidekiq
      name: Sidekiq
    - owner: jwt
      repo: ruby-jwt
      name: ruby-jwt
    - owner: doorkeeper-gem
      repo: doorkeeper
      name: Doorkeeper
    - owner: heartcombo
      repo: devise
      name: Devise

  rubygems:
    - pg
    - puma
    - redis
    - faraday
    - sidekiq
    - jwt
    - doorkeeper
    - devise

  rss_feeds:
    # Official Go blog (releases, language features, tooling)
    - url: https://go.dev/blog/feed.atom
      name: The Go Blog
    # Ruby official news (releases, security advisories, announcements)
    - url: https://www.ruby-lang.org/en/feeds/news.rss
      name: Ruby Official News
    # Official Rails security announcements (low-traffic, embargo-safe)
    - url: https://discuss.rubyonrails.org/c/security-announcements/9.rss
      name: Rails Security Announcements
    # Ruby Redmine issue tracker (recent discussions and bug reports)
    - url: https://bugs.ruby-lang.org/issues.atom
      name: Ruby Issue Tracker (Redmine)
    # Rails official blog (This Week in Rails, release notes)
    - url: https://rubyonrails.org/feed.xml
      name: Rails Official Blog
    - url: https://rubyweekly.com/rss/
      name: Ruby Weekly

  github_advisories:
    ecosystem: rubygems
    packages: [pg, puma, redis, faraday, sidekiq, jwt, doorkeeper, devise, rails, rake, bundler]

  # Repo-level advisories for core projects where security announcements
  # may appear at repository level in addition to RubyGems advisories.
  github_repo_advisories:
    - owner: rails
      repo: rails
      name: Ruby on Rails

devops:
  github_releases:
    # Database/cache servers (distinct from backend pg gem / redis-rb client)
    # PostgreSQL: releases and security fixes via official GitHub; Redis: releases only
    - owner: postgres
      repo: postgres
      name: PostgreSQL (server)
    - owner: redis
      repo: redis
      name: Redis (server)
    - owner: valkey-io
      repo: valkey
      name: Valkey (server)
    - owner: helm
      repo: helm
      name: Helm
    - owner: grafana
      repo: grafana
      name: Grafana
    - owner: argoproj
      repo: argo-cd
      name: ArgoCD
      release_notes_domains:
        - argo-cd.readthedocs.io
        - blog.argoproj.io
    - owner: moby
      repo: moby
      name: Docker Engine
    - owner: stakater
      repo: Reloader
      name: Reloader
    - owner: docker-library
      repo: ruby
      name: Docker Ruby
    - owner: nginx
      repo: nginx
      name: Nginx
    - owner: gitlabhq
      repo: gitlabhq
      name: GitLab
    - owner: kubernetes
      repo: kubernetes
      name: Kubernetes
      release_notes_path_template: "CHANGELOG/CHANGELOG-%{major}.%{minor}.md"
    - owner: opentofu
      repo: opentofu
      name: OpenTofu
    - owner: awslabs
      repo: amazon-eks-ami
      name: Amazon EKS AMI

  github_issues:
    - owner: helm
      repo: helm
      name: Helm
    - owner: grafana
      repo: grafana
      name: Grafana
    - owner: argoproj
      repo: argo-cd
      name: ArgoCD
    - owner: moby
      repo: moby
      name: Docker Engine
    - owner: stakater
      repo: Reloader
      name: Reloader
    - owner: docker-library
      repo: ruby
      name: Docker Ruby
    - owner: nginx
      repo: nginx
      name: Nginx
    - owner: kubernetes
      repo: kubernetes
      name: Kubernetes
    - owner: opentofu
      repo: opentofu
      name: OpenTofu
    - owner: awslabs
      repo: amazon-eks-ami
      name: Amazon EKS AMI

  rss_feeds:
    # AWS EKS Kubernetes version lifecycle (doc changes = version/support updates)
    - url: https://github.com/awsdocs/amazon-eks-user-guide/commits/mainline/latest/ug/versioning/kubernetes-versions.adoc.atom
      name: Amazon EKS Kubernetes Versions (doc updates)
    # GitLab blog covers all posts; atom.xml includes release announcements
    - url: https://about.gitlab.com/atom.xml
      name: GitLab Blog & Releases
    # Official Kubernetes CVE feed (Kubernetes Security Response Committee)
    - url: https://kubernetes.io/docs/reference/issues-security/official-cve-feed/feed.xml
      name: Kubernetes Official CVE Feed
    - url: https://aws.amazon.com/blogs/aws/feed/
      name: AWS News Blog
    - url: https://aws.amazon.com/blogs/security/feed/
      name: AWS Security Blog
    - url: https://kubernetes.io/feed.xml
      name: Kubernetes Blog

  github_advisories:
    ecosystem: go
    packages:
      - github.com/containerd/containerd
      - github.com/opencontainers/runc
      - k8s.io/kubernetes
      - github.com/opentofu/opentofu
      - github.com/docker/cli
      - github.com/moby/moby
      - helm.sh/helm/v3
      - github.com/grafana/grafana
      - github.com/argoproj/argo-cd/v2

  # C/server projects are not consistently represented in ecosystem advisories.
  # Track their repository-level security advisories directly.
  github_repo_advisories:
    - owner: valkey-io
      repo: valkey
      name: Valkey
    - owner: postgres
      repo: postgres
      name: PostgreSQL
    - owner: redis
      repo: redis
      name: Redis
    - owner: nginx
      repo: nginx
      name: Nginx
